fetch("api/theory.php")
.then(response => response.json())
.then(data => {

    let html = "";

    data.forEach(item => {

        html += `
            <section>
                <h2>${item.title}</h2>
                <p>${item.text}</p>
            </section>
        `;

    });

    document.getElementById("content").innerHTML = html;

});
