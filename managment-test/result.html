<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Результати тестування</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f7fa;
}

.container{
    width:700px;
    max-width:90%;
    margin:60px auto;
    background:white;
    border-radius:10px;
    padding:40px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#2c3e50;
}

.result{
    margin-top:30px;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:15px;
    border-bottom:1px solid #ddd;
    font-size:20px;
}

.correct{
    color:green;
    font-weight:bold;
}

.wrong{
    color:red;
    font-weight:bold;
}

.percent{
    color:#0066cc;
    font-weight:bold;
}

.grade{
    color:#8e44ad;
    font-weight:bold;
}

.message{
    margin-top:35px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

button{
    display:block;
    margin:40px auto 0;
    padding:14px 30px;
    font-size:18px;
    cursor:pointer;
    border:none;
    background:#3498db;
    color:white;
    border-radius:8px;
}

button:hover{
    background:#2980b9;
}

</style>

</head>
<body>

<div class="container">

<h1>Результати тестування</h1>

<div class="result">

<div class="item">
<span>Правильних відповідей</span>
<span class="correct" id="correct"></span>
</div>

<div class="item">
<span>Неправильних відповідей</span>
<span class="wrong" id="wrong"></span>
</div>

<div class="item">
<span>Відсоток правильних відповідей</span>
<span class="percent" id="percent"></span>
</div>

<div class="item">
<span>Оцінка (12-бальна шкала)</span>
<span class="grade" id="grade"></span>
</div>

</div>

<div class="message" id="message"></div>

<div class="item">
    <span>Витрачений час</span>
    <span id="spentTime"></span>
</div>

<button onclick="restartTest()">
        Пройти тест ще раз
    </button>

    <button onclick="goHome()">
        Головна сторінка
    </button>

    <button onclick="goProfile()">
        Особистий кабінет
    </button>

</div>




<script>

const score = Number(localStorage.getItem("score")) || 0;

const total =
Number(localStorage.getItem("totalQuestions")) || 15;

const wrong = total - score;

const percent =
Math.round(score / total * 100);

const grade =
Math.round(score / total * 12);

const totalTime = 60;

const timeLeft =
Number(localStorage.getItem("timeLeft")) || 0;

const spentTime = totalTime - timeLeft;

const minutes = Math.floor(spentTime / 60);
const seconds = spentTime % 60;

document.getElementById("spentTime").innerHTML =
minutes + " хв " + seconds + " с";

document.getElementById("correct").innerHTML = score;

document.getElementById("wrong").innerHTML = wrong;

document.getElementById("percent").innerHTML =
percent + "%";

document.getElementById("grade").innerHTML =
grade + " / 12";

let text = "";

if(percent >= 90){

    text = "Відмінний результат!";

}
else if(percent >= 75){

    text = "Добрий результат!";

}
else if(percent >= 60){

    text = "Тест складено.";

}
else{

    text = "Тест не складено. Спробуйте ще раз.";

}

document.getElementById("message").innerHTML =
text;

function restartTest() {
    localStorage.clear();
    window.location.href = "test.html";
}

function goHome() {
    window.location.href = "index.php";
}

function goProfile() {
    window.location.href = "profile.php";
}


</script>

</body>
</html>
